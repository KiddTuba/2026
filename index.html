      {

    function App() {
      const [selectedChar, setSelectedChar] = useState("");
      const [activeSceneIndex, setActiveSceneIndex] = useState(0);
      const [activeLineIndex, setActiveLineIndex] = useState(-1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isWaitingForUser, setIsWaitingForUser] = useState(false);
      
      const scriptRefs = useRef([]);

      const activeScene = SCRIPT[activeSceneIndex];

      // Speech Synthesis logic
      useEffect(() => {
        if (!isPlaying) {
          window.speechSynthesis.cancel();
          return;
        }

        const line = activeScene.lines[activeLineIndex];
        
        // Reached end of scene
        if (!line) {
          setIsPlaying(false);
          setActiveLineIndex(-1);
          return;
        }

        // Auto-scroll to active line
        if (scriptRefs.current[activeLineIndex]) {
          scriptRefs.current[activeLineIndex].scrollIntoView({
            behavior: "smooth",
            block: "center"
          });
        }

        // Stage directions or song lyrics - skip AI reading, just show it briefly
        if (line.type === 'stage' || line.type === 'song') {
          const timer = setTimeout(() => {
            setActiveLineIndex(prev => prev + 1);
          }, 2000);
          return () => clearTimeout(timer);
        }

        // Determine if it's the user's line
        // If they chose "Maya", then "Maya" and "All Kids" will count as their line
        const isMyLine = selectedChar && (
            line.speaker === selectedChar || 
            (line.speaker === "All Kids" && selectedChar !== "Ms. Thompson" && selectedChar !== "Grandma" && selectedChar !== "The Mayor") ||
            line.speaker.includes(selectedChar)
        );

        if (isMyLine) {
          // It's their turn! Wait for them to click Next
          setIsWaitingForUser(true);
          return; 
        }

        // Otherwise, the AI reads it
        setIsWaitingForUser(false);
        const utterance = new SpeechSynthesisUtterance(line.text);
        
        // Pick a decent voice if available
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(v => v.name.includes("Google US English") || v.lang === "en-US");
        if (preferredVoice) utterance.voice = preferredVoice;
        
        // Change pitch slightly based on character just for variety (optional fun feature)
        utterance.pitch = (line.speaker === "Max" || line.speaker === "Maya") ? 1.2 : 1.0;
        utterance.rate = 0.95; 

        utterance.onend = () => {
          setActiveLineIndex(prev => prev + 1);
        };
        
        utterance.onerror = (e) => {
          console.error("Speech Error:", e);
          setActiveLineIndex(prev => prev + 1); // Skip on error
        };

        window.speechSynthesis.speak(utterance);

        return () => {
          window.speechSynthesis.cancel();
        };

      }, [isPlaying, activeLineIndex, activeScene, selectedChar]);

      // Initialize voices
      useEffect(() => {
        window.speechSynthesis.getVoices();
      }, []);

      const handleStartRehearsal = () => {
        if (!selectedChar) {
          alert("Please select a character first!");
          return;
        }
        setIsPlaying(true);
        setActiveLineIndex(0);
      };

      const handleStopRehearsal = () => {
        setIsPlaying(false);
        setIsWaitingForUser(false);
        window.speechSynthesis.cancel();
      };

      const handleUserReadNext = () => {
        setIsWaitingForUser(false);
        setActiveLineIndex(prev => prev + 1);
      };

      const handleLineClick = (idx) => {
        if (!isPlaying) return;
        window.speechSynthesis.cancel();
        setActiveLineIndex(idx);
        setIsWaitingForUser(false);
      };

      const handleHearMyLine = () => {
        window.speechSynthesis.cancel();
        const line = activeScene.lines[activeLineIndex];
        const utterance = new SpeechSynthesisUtterance(line.text);
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(v => v.name.includes("Google US English") || v.lang === "en-US");
        if (preferredVoice) utterance.voice = preferredVoice;
        utterance.pitch = (line.speaker === "Max" || line.speaker === "Maya") ? 1.2 : 1.0;
        utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
      };

      const handleSceneChange = (index) => {
        handleStopRehearsal();
        setActiveSceneIndex(index);
        setActiveLineIndex(-1);
      };

      return (
        <div className="min-h-screen flex flex-col items-center pb-20">
          
          {/* Header */}
          <header className="w-full bg-green-600 text-white shadow-md p-4 sticky top-0 z-50">
            <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
              <div>
                <h1 className="text-2xl font-bold flex items-center gap-2">
                  <i className="fas fa-masks-theater"></i> Family, Forever
                </h1>
                <p className="text-green-200 text-sm">Virtual Rehearsal Assistant</p>
              </div>
              
              <div className="flex items-center gap-3 bg-green-700 p-2 rounded-lg">
                <label className="font-semibold text-sm">My Character:</label>
                <select 
                  className="text-black px-3 py-1 rounded shadow-sm outline-none"
                  value={selectedChar}
                  onChange={(e) => {
                    setSelectedChar(e.target.value);
                    handleStopRehearsal();
                  }}
                >
                  <option value="">-- Choose Role --</option>
                  {CHARACTERS.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            </div>
          </header>

          <main className="w-full max-w-4xl mx-auto mt-6 px-4">
            
            {/* Scene Selector Tabs */}
            <div className="flex overflow-x-auto no-scrollbar gap-2 mb-6 p-2 bg-white rounded-xl shadow">
              {SCRIPT.map((scene, idx) => (
                <button
                  key={scene.id}
                  onClick={() => handleSceneChange(idx)}
                  className={`whitespace-nowrap px-4 py-2 rounded-lg font-medium transition-colors ${
                    activeSceneIndex === idx 
                    ? "bg-green-500 text-white shadow-sm" 
                    : "text-gray-600 hover:bg-gray-100"
                  }`}
                >
                  Scene {idx + 1}
                </button>
              ))}
            </div>

            {/* Main Stage Area */}
            <div className="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden relative">
              
              {/* Scene Info */}
              <div className="bg-gray-50 border-b border-gray-200 p-6 text-center">
                <h2 className="text-2xl font-bold text-gray-800 mb-2">{activeScene.title}</h2>
                <p className="text-gray-600 italic text-sm">{activeScene.setting}</p>
              </div>

              {/* Controls */}
              <div className="flex justify-center gap-4 p-4 border-b border-gray-100 bg-white sticky top-0 z-40 shadow-sm">
                {!isPlaying ? (
                  <button 
                    onClick={handleStartRehearsal}
                    className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-full font-bold shadow-md transition transform hover:scale-105 flex items-center gap-2"
                  >
                    <i className="fas fa-play"></i> Start Rehearsal
                  </button>
                ) : (
                  <>
                    <button 
                      onClick={handleStopRehearsal}
                      className="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-full font-bold shadow-md transition flex items-center gap-2"
                    >
                      <i className="fas fa-stop"></i> Stop Rehearsal
                    </button>

                    {isWaitingForUser && (
                      <div className="flex gap-2">
                        <button 
                          onClick={handleHearMyLine}
                          className="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-full font-bold shadow-md transition flex items-center gap-2 border-2 border-white"
                        >
                          <i className="fas fa-volume-up"></i> Hear Line
                        </button>
                        <button 
                          onClick={handleUserReadNext}
                          className="bg-green-500 hover:bg-green-600 animate-pulse text-white px-6 py-2 rounded-full font-bold shadow-lg transition flex items-center gap-2 border-2 border-white"
                        >
                          <i className="fas fa-check"></i> Next Line
                        </button>
                      </div>
                    )}
                  </>
                )}
              </div>

              {/* Script Lines */}
              <div className="p-6 space-y-4 text-lg">
                {activeScene.lines.map((line, idx) => {
                  const isMyLine = selectedChar && (
                    line.speaker === selectedChar || 
                    (line.speaker === "All Kids" && selectedChar !== "Ms. Thompson" && selectedChar !== "Grandma" && selectedChar !== "The Mayor") ||
                    (line.speaker && line.speaker.includes(selectedChar))
                  );
                  
                  const isActive = isPlaying && activeLineIndex === idx;

                  let lineStyle = "p-4 rounded-lg transition-colors border border-transparent ";
                  
                  if (isActive) {
                    lineStyle += "active-line shadow-md scale-[1.01] ";
                  } else if (isMyLine && !line.type) {
                    lineStyle += "my-line ";
                  } else {
                    lineStyle += "bg-white ";
                  }

                  if (isPlaying) {
                    lineStyle += "cursor-pointer hover:opacity-80 ";
                  }

                  if (line.type === 'stage') {
                    return (
                      <div key={idx} ref={el => scriptRefs.current[idx] = el} onClick={() => handleLineClick(idx)} className={`text-center my-4 ${isActive ? 'active-line' : ''} ${isPlaying ? 'cursor-pointer' : ''}`}>
                        <span className="stage-direction">{line.text}</span>
                      </div>
                    );
                  }

                  if (line.type === 'song') {
                    return (
                      <div key={idx} ref={el => scriptRefs.current[idx] = el} onClick={() => handleLineClick(idx)} className={`my-2 p-3 rounded-lg flex gap-4 ${isActive ? 'active-line' : 'bg-indigo-50 border border-indigo-100'} ${isPlaying ? 'cursor-pointer' : ''}`}>
                        <div className="font-bold text-indigo-700 w-24 shrink-0 text-right"><i className="fas fa-music text-xs mr-1"></i> {line.speaker}</div>
                        <div className="song-lyric whitespace-pre-wrap">{line.text}</div>
                      </div>
                    );
                  }

                  return (
                    <div key={idx} ref={el => scriptRefs.current[idx] = el} onClick={() => handleLineClick(idx)} className={`flex gap-4 ${lineStyle}`}>
                      <div className="font-bold text-gray-700 w-24 shrink-0 text-right">
                        {line.speaker}
                      </div>
                      <div className={`flex-1 ${isMyLine ? 'font-medium' : 'text-gray-800'}`}>
                        {line.text}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* End of Scene / Audio Player for the Song */}
              <div className="bg-indigo-50 p-6 border-t border-indigo-100 mt-8">
                <h3 className="text-xl font-bold text-indigo-900 mb-2 flex items-center gap-2">
                  <i className="fas fa-microphone-alt"></i> Music Practice: {activeScene.songName}
                </h3>
                <p className="text-indigo-700 text-sm mb-4">Play the instrumental track below to practice your singing for this scene!</p>
                
                <div className="bg-white p-4 rounded-xl shadow-sm border border-indigo-200">
                  <audio controls className="w-full" src={encodeURI(activeScene.audioFile)}>
                    Your browser does not support the audio element.
                  </audio>
                </div>
              </div>

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
